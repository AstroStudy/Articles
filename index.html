<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Articles by Kishore DVR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
    }
    .navbar {
      background-color: #4CAF50;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .navbar .menu {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }
    .navbar a, .navbar .print-button {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      background: none;
      border: none;
      font-size: inherit;
      cursor: pointer;
      font-family: inherit;
    }
    .navbar a:hover, .navbar .print-button:hover {
      background-color: #45a049;
    }
    #google_translate_element {
      margin-left: 10px;
    }
    .main-content {
      display: flex;
      height: calc(100vh - 60px);
    }
    .explorer {
      width: 250px;
      background-color: #ffffff;
      border-right: 1px solid #ccc;
      padding: 15px;
      overflow-y: auto;
      font-size: 13px;
    }
    .explorer h3 {
      color: #4CAF50;
      margin: 10px 0;
      cursor: pointer;
      font-size: 14px;
    }
    .explorer .sub-headings {
      display: none;
      margin-left: 10px;
    }
    .explorer .heading-link {
      display: block;
      margin: 5px 0;
      font-size: 12px;
      color: #333;
      text-decoration: none;
    }
    .explorer .heading-link:hover {
      text-decoration: underline;
      color: #4CAF50;
    }
    .pdf-viewer {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }
    .pdf-viewer iframe {
      width: 100%;
      height: 90vh;
      border: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
      }
      .explorer {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ccc;
      }
      .pdf-viewer iframe {
        height: 60vh;
      }
    }
    /* Print-specific styles */
    @media print {
      body * {
        visibility: hidden;
        margin: 0 !important;
        padding: 0 !important;
      }
      .pdf-viewer, 
      .pdf-viewer iframe {
        visibility: visible;
        position: fixed !important;
        left: 0 !important;
        top: 0 !important;
        width: 100vw !important;
        height: 100vh !important;
        border: none !important;
        box-shadow: none !important;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <div class="navbar">
    <div class="menu">
      <a href="https://kishoredvr.github.io/Exploring/">Home</a>
      <a href="https://kishoredvr.github.io/Exploring/AboutMe.html">Origin Of Thoughts</a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdM_eKzDRgqgfaokbaEI2nRi4ROqIqbWHviMTkFArBECH2htw/viewform?usp=header">Message Me</a>
      <div id="google_translate_element"></div>
      <button class="print-button" onclick="printArticle()">Print This Article</button>
    </div>
  </div>

  <!-- Main Layout -->
  <div class="main-content">
    <div class="explorer">
      <!-- Explorer content unchanged -->
    </div>

    <div class="pdf-viewer" id="viewer">
      <iframe id="pdfFrame" src="https://drive.google.com/file/d/1hWDWMVnpeN5dRw32lnjUNpqQRb1jBBZn/preview" width="100%" height="600px"></iframe>
    </div>
  </div>

  <script>
    function toggleSection(id) {
      const section = document.getElementById(id);
      const isVisible = section.style.display === 'block';
      document.querySelectorAll('.sub-headings').forEach(div => div.style.display = 'none');
      section.style.display = isVisible ? 'none' : 'block';
    }

    function printArticle() {
      const iframe = document.getElementById('pdfFrame');
      const originalSrc = iframe.src;
      
      // Create temporary print-optimized iframe
      const tempIframe = document.createElement('iframe');
      tempIframe.style.cssText = `
        position: fixed;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
        border: none;
        z-index: 9999;
        visibility: hidden;
      `;
      
      // Use Google Drive's print-friendly view
      const printSrc = originalSrc
        .replace('/preview', '/view')
        + '?rm=minimal&view=FitH';
      
      tempIframe.src = printSrc;
      document.body.appendChild(tempIframe);

      tempIframe.onload = function() {
        setTimeout(() => {
          try {
            // Trigger print dialog
            tempIframe.contentWindow.focus();
            tempIframe.contentWindow.print();
          } catch (e) {
            // Fallback to regular print
            window.print();
          }
          
          // Cleanup after printing
          document.body.removeChild(tempIframe);
        }, 1000);
      };
    }

    // Initialize click handlers
    document.addEventListener("DOMContentLoaded", function() {
      const links = document.querySelectorAll('.heading-link');
      links.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const fileId = this.getAttribute('data-fileid');
          if (fileId) {
            document.getElementById('pdfFrame').src = 
              `https://drive.google.com/file/d/${fileId}/preview`;
          }
        });
      });
    });
  </script>

  <!-- Google Translate -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
