<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Articles by Kishore DVR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
    }
    .navbar {
      background-color: #4CAF50;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .navbar .menu {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }
    .navbar a, .navbar .print-button {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      background: none;
      border: none;
      font-size: inherit;
      cursor: pointer;
      font-family: inherit;
    }
    .navbar a:hover, .navbar .print-button:hover {
      background-color: #45a049;
    }
    #google_translate_element {
      margin-left: 10px;
    }
    .main-content {
      display: flex;
      height: calc(100vh - 60px);
    }
    .explorer {
      width: 250px;
      background-color: #ffffff;
      border-right: 1px solid #ccc;
      padding: 15px;
      overflow-y: auto;
      font-size: 13px;
    }
    .explorer h3 {
      color: #4CAF50;
      margin: 10px 0;
      cursor: pointer;
      font-size: 14px;
    }
    .explorer .sub-headings {
      display: none;
      margin-left: 10px;
    }
    .explorer .heading-link {
      display: block;
      margin: 5px 0;
      font-size: 12px;
      color: #333;
      text-decoration: none;
    }
    .explorer .heading-link:hover {
      text-decoration: underline;
      color: #4CAF50;
    }
    .pdf-viewer {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }
    .pdf-viewer iframe {
      width: 100%;
      height: 90vh;
      border: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
      }
      .explorer {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ccc;
      }
      .pdf-viewer iframe {
        height: 60vh;
      }
    }
    /* Print-specific styles */
    @media print {
      body * {
        visibility: hidden;
      }
      .pdf-viewer, .pdf-viewer * {
        visibility: visible;
      }
      .pdf-viewer {
        position: absolute;
        left: 0;
        top: 0;
        width: 100%;
        height: 100%;
      }
      .navbar, .explorer {
        display: none;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <div class="navbar">
    <div class="menu">
      <a href="https://kishoredvr.github.io/Exploring/">Home</a>
      <a href="https://kishoredvr.github.io/Exploring/AboutMe.html">Origin Of Thoughts</a>
      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdM_eKzDRgqgfaokbaEI2nRi4ROqIqbWHviMTkFArBECH2htw/viewform?usp=header">Message Me</a>
      <div id="google_translate_element"></div>
      <button class="print-button" onclick="printArticle()">Print This Article</button>
    </div>
  </div>

  <!-- Main Layout with Explorer and Viewer -->
  <div class="main-content">
    <div class="explorer">
      <h3 onclick="toggleSection('section1')">▶ Digital Reliability</h3>
      <div id="section1" class="sub-headings">
        <a href="#" class="heading-link" data-fileid="FILE_ID_1">Heading 1</a>
        <a href="#" class="heading-link" data-fileid="FILE_ID_2">Heading 2</a>
      </div>

      <h3 onclick="toggleSection('section2')">▶ Vedic Astrology</h3>
      <div id="section2" class="sub-headings">
        <a href="#" class="heading-link" data-fileid="FILE_ID_3">Heading 1</a>
        <a href="#" class="heading-link" data-fileid="FILE_ID_4">Heading 2</a>
      </div>

      <h3 onclick="toggleSection('section3')">▶ National Economies</h3>
      <div id="section3" class="sub-headings">
        <a href="#" class="heading-link" data-fileid="FILE_ID_5">Heading 1</a>
        <a href="#" class="heading-link" data-fileid="FILE_ID_6">Heading 2</a>
      </div>

      <h3 onclick="toggleSection('section4')">▶ Other Topics</h3>
      <div id="section4" class="sub-headings">
        <a href="#" class="heading-link" data-fileid="1cDUr3OvvQBwUcamPMY7K1IB096CiwPn6">My View on Alternative Director</a>
      </div>
    </div>

    <div class="pdf-viewer" id="viewer">
      <iframe id="pdfFrame" src="https://drive.google.com/file/d/1hWDWMVnpeN5dRw32lnjUNpqQRb1jBBZn/preview" width="100%" height="600px"></iframe>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    function toggleSection(id) {
      const section = document.getElementById(id);
      const isVisible = section.style.display === 'block';
      document.querySelectorAll('.sub-headings').forEach(div => div.style.display = 'none');
      section.style.display = isVisible ? 'none' : 'block';
    }

    function printArticle() {
      // Create a temporary iframe for printing
      const printFrame = document.createElement('iframe');
      printFrame.style.position = 'absolute';
      printFrame.style.width = '0';
      printFrame.style.height = '0';
      printFrame.style.border = 'none';
      
      // Get the current PDF URL and modify it for printing
      const pdfUrl = document.getElementById('pdfFrame').src;
      const printUrl = pdfUrl.replace('/preview', '/view?usp=sharing&print=true');
      
      printFrame.src = printUrl;
      document.body.appendChild(printFrame);
      
      printFrame.onload = function() {
        try {
          // Try to print the iframe content
          printFrame.contentWindow.focus();
          printFrame.contentWindow.print();
        } catch (e) {
          // Fallback to browser print if direct printing fails
          window.print();
        }
        
        // Remove the iframe after printing
        setTimeout(() => {
          document.body.removeChild(printFrame);
        }, 1000);
      };
    }

    // Attach click handlers after DOM loads
    document.addEventListener("DOMContentLoaded", function() {
      const links = document.querySelectorAll('.heading-link');
      links.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const fileId = this.getAttribute('data-fileid');
          if (fileId) {
            const iframe = document.getElementById('pdfFrame');
            iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
          }
        });
      });
    });
  </script>

  <!-- Google Translate -->
  <script type="text/javascript">
    function googleTranslateElementInit() {
      new google.translate.TranslateElement({pageLanguage: 'en'}, 'google_translate_element');
    }
  </script>
  <script type="text/javascript" src="//translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

</body>
</html>
