<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Three-Column PDF Viewer</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f8f9fa;
        }
        .navbar {
            background-color: #4CAF50; /* Green color */
            padding: 10px;
            text-align: center;
        }
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 10px 20px;
            display: inline-block;
        }
        .navbar a:hover {
            background-color: #45a049;
        }
        .container {
            display: flex;
            gap: 10px;
            justify-content: center;
            flex-wrap: wrap;
            padding: 20px;
        }
        .column {
            width: 30%;
            min-width: 300px;
            border: 1px solid #ccc;
            padding: 10px;
            background-color: white;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.1);
            text-align: center; /* Center align topics */
        }
        .topic-title {
            color: #4CAF50; /* Green font color */
        }
        .heading {
            cursor: pointer;
            padding: 10px;
            background-color: #f1f1f1; /* Keeping headings unchanged */
            border: 1px solid #ccc;
            margin-top: 5px;
            text-align: center;
        }
        .content {
            display: none;
            padding: 10px;
        }
        @media (max-width: 900px) {
            .column {
                width: 100%;
            }
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <div class="navbar">
        <a href="https://kishoredvr.github.io/Exploring/">Home</a>
        <a href="https://kishoredvr.github.io/Exploring/origin-of-thoughts.html">Origin Of Thoughts</a>
        <a href="https://kishoredvr.github.io/Exploring/message-me.html">Message Me</a>
    </div>

    <div class="container">
        <!-- Column 1 -->
        <div class="column">
            <h2 class="topic-title">Topic 1</h2>
            <div class="heading" onclick="togglePDF('pdf1')">Heading 1</div>
            <div id="pdf1" class="content">
                <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview" width="100%" height="500px"></iframe>
            </div>

            <div class="heading" onclick="togglePDF('pdf2')">Heading 2</div>
            <div id="pdf2" class="content">
                <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview" width="100%" height="500px"></iframe>
            </div>
        </div>

        <!-- Column 2 -->
        <div class="column">
            <h2 class="topic-title">Topic 2</h2>
            <div class="heading" onclick="togglePDF('pdf3')">Heading 1</div>
            <div id="pdf3" class="content">
                <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview" width="100%" height="500px"></iframe>
            </div>

            <div class="heading" onclick="togglePDF('pdf4')">Heading 2</div>
            <div id="pdf4" class="content">
                <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview" width="100%" height="500px"></iframe>
            </div>
        </div>

        <!-- Column 3 -->
        <div class="column">
            <h2 class="topic-title">Topic 3</h2>
            <div class="heading" onclick="togglePDF('pdf5')">Heading 1</div>
            <div id="pdf5" class="content">
                <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview" width="100%" height="500px"></iframe>
            </div>

            <div class="heading" onclick="togglePDF('pdf6')">Heading 2</div>
            <div id="pdf6" class="content">
                <iframe src="https://drive.google.com/file/d/YOUR_FILE_ID/preview" width="100%" height="500px"></iframe>
            </div>
        </div>
    </div>

    <script>
        function togglePDF(id) {
            let contents = document.querySelectorAll('.content');
            contents.forEach(content => {
                if (content.id === id) {
                    content.style.display = content.style.display === 'block' ? 'none' : 'block';
                } else {
                    content.style.display = 'none';
                }
            });
        }
    </script>

</body>
</html>
