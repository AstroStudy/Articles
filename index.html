<!DOCTYPE html>  
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Articles by Kishore DVR</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
    }
    .navbar {
      background-color: #4CAF50;
      padding: 10px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
    }
    .navbar .menu {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
    }
    .navbar a, .navbar .print-button {
      color: white;
      text-decoration: none;
      padding: 10px 20px;
      display: inline-block;
      background: none;
      border: none;
      font-size: inherit;
      cursor: pointer;
      font-family: inherit;
    }
    .navbar a:hover, .navbar .print-button:hover {
      background-color: #45a049;
    }
    #google_translate_element {
      margin-left: 10px;
    }
    .main-content {
      display: flex;
      height: calc(100vh - 60px);
    }
    .explorer {
      width: 250px;
      background-color: #ffffff;
      border-right: 1px solid #ccc;
      padding: 15px;
      overflow-y: auto;
      font-size: 13px;
    }
    .explorer h3 {
      color: #4CAF50;
      margin: 10px 0;
      cursor: pointer;
      font-size: 14px;
    }
    .explorer .sub-headings {
      display: none;
      margin-left: 10px;
    }
    .explorer .heading-link {
      display: block;
      margin: 5px 0;
      font-size: 12px;
      color: #333;
      text-decoration: none;
    }
    .explorer .heading-link:hover {
      text-decoration: underline;
      color: #4CAF50;
    }
    .pdf-viewer {
      flex: 1;
      padding: 20px;
      overflow: auto;
    }
    .pdf-viewer iframe {
      width: 100%;
      height: 90vh;
      border: none;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    @media (max-width: 768px) {
      .main-content {
        flex-direction: column;
      }
      .explorer {
        width: 100%;
        border-right: none;
        border-bottom: 1px solid #ccc;
      }
      .pdf-viewer iframe {
        height: 60vh;
      }
    }
    /* Print-specific styles */
    @media print {
      body * {
        visibility: hidden;
      }
      .pdf-viewer, .pdf-viewer * {
        visibility: visible;
      }
      .pdf-viewer {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        margin: 0;
        padding: 0;
      }
      .pdf-viewer iframe {
        width: 100%;
        height: 100%;
        border: none;
      }
    }
  </style>
</head>
<body>

  <!-- Navigation Bar -->
  <div class="navbar">
    <div class="menu">
      <a href="https://kishoredvr.github.io/Exploring/">Home</a>

      <a href="https://docs.google.com/forms/d/e/1FAIpQLSdM_eKzDRgqgfaokbaEI2nRi4ROqIqbWHviMTkFArBECH2htw/viewform?usp=header">Message Me</a>
      <div id="google_translate_element"></div>
      </div>
  </div>

  <!-- Main Layout with Explorer and Viewer -->
  <div class="main-content">
    <div class="explorer">
      <h3 onclick="toggleSection('section1')">▶ Digital Reliability</h3>
      <div id="section1" class="sub-headings">
        <a href="#" class="heading-link" data-fileid="FILE_ID_1">Heading 1</a>
        <a href="#" class="heading-link" data-fileid="FILE_ID_2">Heading 2</a>
      </div>

      <h3 onclick="toggleSection('section2')">▶ Vedic Astrology</h3>
      <div id="section2" class="sub-headings">
        <a href="#" class="heading-link" data-fileid="FILE_ID_3">Heading 1</a>
        <a href="#" class="heading-link" data-fileid="FILE_ID_4">Heading 2</a>
      </div>

      <h3 onclick="toggleSection('section3')">▶ National Economies</h3>
      <div id="section3" class="sub-headings">
        <a href="#" class="heading-link" data-fileid="1Azxn_sL25RSzM_GHUAh9XgY4BVNpGuvg">Finland Basic Intro</a>
        <a href="#" class="heading-link" data-fileid="FILE_ID_6">Heading 2</a>

      <h3 onclick="toggleSection('section4')">▶ Other Topics</h3>

    </div>

    <div class="pdf-viewer" id="viewer">
      <iframe id="pdfFrame" src="https://drive.google.com/file/d/1hWDWMVnpeN5dRw32lnjUNpqQRb1jBBZn/preview" width="100%" height="600px"></iframe>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
    function toggleSection(id) {
      const section = document.getElementById(id);
      const isVisible = section.style.display === 'block';
      document.querySelectorAll('.sub-headings').forEach(div => div.style.display = 'none');
      section.style.display = isVisible ? 'none' : 'block';
    }

    function printArticle() {
      const pdfFrame = document.getElementById('pdfFrame');
      
      // First try to print the iframe directly
      try {
        // Focus the iframe
        pdfFrame.focus();
        
        // Try to call print on the iframe's contentWindow
        if (pdfFrame.contentWindow && typeof pdfFrame.contentWindow.print === 'function') {
          pdfFrame.contentWindow.print();
          return;
        }
      } catch (e) {
        console.log("Direct print failed, trying fallback method");
      }
      
      // Fallback method - open PDF in new window and print
      const currentSrc = pdfFrame.src;
      const printUrl = currentSrc.replace('/preview', '');
      
      const printWindow = window.open(printUrl, '_blank');
      if (printWindow) {
        printWindow.onload = function() {
          setTimeout(() => {
            try {
              printWindow.print();
            } catch (e) {
              // Show manual print instructions if automatic fails
              printWindow.document.body.innerHTML = `
                <div style="padding: 20px; font-family: Arial, sans-serif;">
                  <h2>Print Instructions</h2>
                  <p>1. Press Ctrl+P (Windows) or Cmd+P (Mac)</p>
                  <p>2. Check "Simplify page" in print dialog if available</p>
                  <p>3. Adjust scale to 100%</p>
                  <button onclick="window.print()" style="padding: 8px 16px; background-color: #4CAF50; color: white; border: none; cursor: pointer;">Try Print Again</button>
                </div>
              `;
            }
          }, 2000);
        };
      } else {
        alert('Please allow pop-ups for this site to enable printing');
      }
    }

    // Attach click handlers after DOM loads
    document.addEventListener("DOMContentLoaded", function() {
      const links = document.querySelectorAll('.heading-link');
      links.forEach(link => {
        link.addEventListener('click', function(e) {
          e.preventDefault();
          const fileId = this.getAttribute('data-fileid');
          if (fileId) {
            const iframe = document.getElementById('pdfFrame');
            iframe.src = `https://drive.google.com/file/d/${fileId}/preview`;
          }
        });
      });
    });
  </script>

  <!-- Google Translate -->
